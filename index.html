<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Again Saskia</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            color: white;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .top-bar {
            margin-bottom: 20px;
        }
        button {
            background: white;
            border: none;
            padding: 10px 20px;
            margin: 10px;
            font-size: 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: lightgray;
        }
        .display-area {
            font-size: 80px;
            margin-top: 20px;
            transition: transform 0.3s;
        }
    </style>
</head>
<body>
    <h1>Hello Saskia</h1>
    <p>You opened this website again?!?!?! Hope you are doing well!</p>
    <div class="top-bar">
        <button id="examplesBtn">Thats creepy.</button>
        <button id="helpBtn">Grow up.</button>
    </div>
    <div class="display-area" id="display"></div>

    <script>
        document.getElementById('examplesBtn').addEventListener('click', function() {
            document.getElementById('display').innerText = 'Thanks';
            document.getElementById('display').style.transform = 'scale(1.2)';
        });

        document.getElementById('helpBtn').addEventListener('click', function() {
            document.getElementById('display').innerText = '🧒';
            document.getElementById('display').style.transform = 'scale(0.8)';
        });
    </script>
</body>
</html>
